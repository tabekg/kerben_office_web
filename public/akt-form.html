<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Генератор ссылки на АКТ</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f6f8;
        color: #1f2329;
      }
      .wrap { max-width: 820px; margin: 32px auto; padding: 0 20px 120px; }
      h1 { margin: 0 0 4px; font-size: 22px; }
      .sub { color: #6b7280; margin-bottom: 24px; font-size: 14px; }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 18px 22px 20px;
        margin-bottom: 16px;
        box-shadow: 0 1px 2px rgba(0,0,0,.03);
      }
      .card.act-card { border-left: 3px solid #2563eb; }
      .card-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
      }
      .card-head h2 {
        margin: 0;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: .05em;
        color: #6b7280;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .card-head h2 .badge {
        background: #2563eb;
        color: #fff;
        font-size: 11px;
        padding: 2px 9px;
        border-radius: 999px;
        font-weight: 700;
      }
      .remove-btn {
        background: transparent;
        border: 1px solid transparent;
        color: #9ca3af;
        cursor: pointer;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 13px;
        font-family: inherit;
      }
      .remove-btn:hover {
        background: #fee2e2;
        color: #b91c1c;
        border-color: #fecaca;
      }
      .section-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .05em;
        color: #9ca3af;
        margin: 12px 0 8px;
      }
      .section-label:first-child { margin-top: 0; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .row.one { grid-template-columns: 1fr; }
      .row.three { grid-template-columns: 1fr 1fr 1fr; }
      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 5px;
        color: #374151;
      }
      label .hint { color: #9ca3af; font-weight: 400; margin-left: 5px; font-size: 11px; }
      input, textarea {
        width: 100%;
        font: inherit;
        font-size: 14px;
        padding: 8px 11px;
        border: 1px solid #d1d5db;
        border-radius: 7px;
        background: #fff;
      }
      input:focus, textarea:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37,99,235,.15);
      }
      textarea { min-height: 54px; resize: vertical; font-family: inherit; }

      .add-act-btn {
        width: 100%;
        padding: 14px;
        background: #fff;
        border: 2px dashed #cbd5e1;
        border-radius: 12px;
        color: #475569;
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 16px;
        transition: all .15s;
      }
      .add-act-btn:hover {
        border-color: #2563eb;
        color: #2563eb;
        background: #eff6ff;
      }

      .sticky-bar {
        position: sticky;
        bottom: 16px;
        margin-top: 16px;
        padding: 14px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,.08);
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .sticky-bar .spacer { flex: 1; }

      .btn {
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 18px;
        border-radius: 8px;
        border: 1px solid transparent;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        text-align: center;
      }
      .btn.primary { background: #2563eb; color: #fff; }
      .btn.primary:hover { background: #1d4ed8; }
      .btn.secondary { background: #fff; color: #374151; border-color: #d1d5db; }
      .btn.secondary:hover { background: #f3f4f6; }
      .btn.ghost { background: transparent; color: #4b5563; }
      .btn.ghost:hover { background: #e5e7eb; }

      .link-box {
        margin-top: 14px;
        padding: 12px;
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        color: #374151;
        display: none;
        max-height: 280px;
        overflow-y: auto;
      }
      .link-box.shown { display: block; }
      .link-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 0;
      }
      .link-item + .link-item { border-top: 1px solid #e5e7eb; }
      .link-item .num {
        flex: 0 0 auto;
        background: #2563eb;
        color: #fff;
        font-weight: 700;
        font-size: 11px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .link-item .range {
        flex: 0 0 auto;
        font-size: 12px;
        color: #6b7280;
        white-space: nowrap;
      }
      .link-item a {
        flex: 1;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        color: #2563eb;
        text-decoration: none;
        word-break: break-all;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .link-item a:hover { text-decoration: underline; }
      .link-item .copy-one {
        flex: 0 0 auto;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        background: #fff;
        cursor: pointer;
        font-family: inherit;
      }
      .link-item .copy-one:hover { background: #f3f4f6; }
      .toast {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #111827;
        color: #fff;
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 14px;
        opacity: 0;
        transition: all .2s;
        pointer-events: none;
        z-index: 200;
      }
      .toast.shown { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Генератор ссылки на АКТ</h1>
      <p class="sub">Заполните акт, нажмите «+ Добавить акт», чтобы дублировать его и поправить только нужное.</p>

      <form id="form">
        <div id="acts"></div>
        <button type="button" class="add-act-btn" id="addBtn">+ Добавить акт</button>

        <div class="sticky-bar">
          <button type="submit" class="btn primary">Скопировать ссылку</button>
          <a id="openLink" class="btn secondary" href="#" target="_blank" rel="noopener" style="display:none">Открыть ↗</a>
          <div class="spacer"></div>
          <button type="button" class="btn ghost" id="reset">Сбросить</button>
        </div>

        <div class="link-box" id="linkBox"></div>
      </form>
    </div>

    <div class="toast" id="toast">Ссылка скопирована</div>

    <script>
      const LS_KEY = "akt";
      const FIELDS = [
        "date", "iden21", "iden18", "get8", "invoice_no", "invoice_date", "plomb",
        "inspector", "rep", "point", "company", "sender", "gti",
      ];

      const DEFAULTS = {
        inspector: "АКБАРОВ А.",
        rep: "СУЛАЙМАНОВ К.",
        point: "ЦТП «ОШ» ЮЗТ",
        company: "ПТЗК «АВТОЭКСПРЕСС ИНВЕСТ»",
        sender: "КНР",
        gti: "ГТИ КР",
      };

      // Pool of vehicle plates to randomly populate iden21.
      // Deduplicated automatically; each number used at most once across the form.
      const IDEN21_POOL = [...new Set([
        "P18595/P6411", "P19562/P6158", "P14906/P6019", "P19053/P6350",
        "P14143/P6492", "P19473/P6832", "P14006/P6640", "P18029/P6921",
        "P14906/P6019", "P19418/P6723", "P14205/P6400", "P14617/P6173",
        "P14006/P6640", "P16038/P5500", "P14143/P6492", "P16038/P5500",
        "P16823/P5286", "P16180/A4H89", "P19747/P6376", "P18637/P6237",
        "P16888/P5237", "P18569/P6969", "P14006/P6640", "P14340/P2624",
        "P18976/P6461", "P14423/P6206", "P18569/P6969", "P14906/P6019",
        "P12476/P6235", "P18637/P6237", "P17073/P5765", "P14906/P6019",
        "P16888/P5237", "P18976/P6461", "P17073/P5765", "P14478/P6187",
        "P17141/P6382", "P19593/P6655", "P19562/P6158", "P19473/P6832",
        "P12476/P6235", "P16222/P6952", "P17453/P6962", "P18976/P6461",
        "P16050/P6092", "P14617/P6173", "P12476/P6235", "P16446/P6742",
        "P16446/P6742", "P14340/P2624", "P16966/P6106", "P14262/P6525",
        "P17453/P6962", "P17200/P6907", "P19053/P6350", "P19593/P6451",
        "P16038/P5500", "P16966/P6106", "P18223/P6763", "P19053/P6350",
        "P14006/P6640", "P16050/P6092", "P17069/P6438", "P19593/P6451",
        "P17200/P6907", "P19451/P6419", "P18976/P6461", "P12476/P6235",
        "P14005/P6655", "P14617/P6173", "P18447/P6449", "P14340/P2624",
        "P19593/P6451", "P14617/P6173", "P12476/P6235", "P19473/P6832",
        "P14143/P6492", "P19053/P6350", "P19562/P6158",
      ])];

      const form = document.getElementById("form");
      const actsContainer = document.getElementById("acts");
      const addBtn = document.getElementById("addBtn");
      const linkBox = document.getElementById("linkBox");
      const openLink = document.getElementById("openLink");
      const toast = document.getElementById("toast");

      function todayStr() {
        const d = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        return pad(d.getDate()) + "." + pad(d.getMonth() + 1) + "." + d.getFullYear();
      }

      // Collect iden21 values currently entered in the form.
      function getUsedIden21() {
        const used = new Set();
        for (const card of actsContainer.querySelectorAll(".act-card")) {
          const el = card.querySelector('[data-field="iden21"]');
          if (el && el.value.trim()) used.add(el.value.trim());
        }
        return used;
      }

      // Pick a random plate not currently in use (plus optional extras to exclude).
      function pickRandomIden21(extra) {
        const used = getUsedIden21();
        if (extra) for (const u of extra) used.add(u);
        const available = IDEN21_POOL.filter((x) => !used.has(x));
        if (available.length === 0) return "";
        return available[Math.floor(Math.random() * available.length)];
      }

      function freshAct() {
        return { ...DEFAULTS, date: todayStr(), iden21: pickRandomIden21() };
      }

      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function readState() {
        try {
          const s = JSON.parse(localStorage.getItem(LS_KEY) || "{}") || {};
          if (!Array.isArray(s.acts) || s.acts.length === 0) s.acts = [freshAct()];
          return s;
        } catch {
          return { acts: [freshAct()] };
        }
      }
      function writeState(obj) {
        localStorage.setItem(LS_KEY, JSON.stringify(obj));
      }

      function readActsFromDom() {
        const acts = [];
        for (const card of actsContainer.querySelectorAll(".act-card")) {
          const a = {};
          for (const f of FIELDS) {
            const el = card.querySelector(`[data-field="${f}"]`);
            if (el) a[f] = el.value;
          }
          acts.push(a);
        }
        return acts;
      }

      function actCardHtml(idx, a) {
        return `
          <div class="card act-card" data-i="${idx}">
            <div class="card-head">
              <h2>Акт <span class="badge">#${idx + 1}</span></h2>
              <button type="button" class="remove-btn" data-action="remove">× Удалить</button>
            </div>

            <div class="section-label">Данные акта</div>
            <div class="row one">
              <div>
                <label>Дата акта <span class="hint">ДД.ММ.ГГГГ</span></label>
                <input type="text" data-field="date" value="${esc(a.date)}" placeholder="27.03.2025" />
              </div>
            </div>
            <div class="row">
              <div>
                <label>Авто отправления (iden21)</label>
                <input type="text" data-field="iden21" value="${esc(a.iden21)}" placeholder="06KG245AС/06KG242PA" />
              </div>
              <div>
                <label>Авто прибытия (iden18)</label>
                <input type="text" data-field="iden18" value="${esc(a.iden18)}" placeholder="01M005432/3724AA" />
              </div>
            </div>
            <div class="row one">
              <div>
                <label>Получатель</label>
                <textarea data-field="get8" placeholder='ИП ООО "БАРАКА ХОЛДИНГ", УЗБЕКИСТАН, …'>${esc(a.get8)}</textarea>
              </div>
            </div>
            <div class="row">
              <div>
                <label>Инвойс №</label>
                <input type="text" data-field="invoice_no" value="${esc(a.invoice_no)}" placeholder="9980" />
              </div>
              <div>
                <label>Инвойс от</label>
                <input type="text" data-field="invoice_date" value="${esc(a.invoice_date)}" placeholder="19.03.2025" />
              </div>
            </div>
            <div class="row one">
              <div>
                <label>Номера пломб <span class="hint">через запятую</span></label>
                <input type="text" data-field="plomb" value="${esc(a.plomb)}" placeholder="412,412,412" />
              </div>
            </div>

            <div class="section-label">Подписанты и реквизиты</div>
            <div class="row">
              <div>
                <label>Инспектор</label>
                <input type="text" data-field="inspector" value="${esc(a.inspector)}" />
              </div>
              <div>
                <label>Представитель</label>
                <input type="text" data-field="rep" value="${esc(a.rep)}" />
              </div>
              <div>
                <label>Пункт</label>
                <input type="text" data-field="point" value="${esc(a.point)}" />
              </div>
              <div>
                <label>Транспортная компания</label>
                <input type="text" data-field="company" value="${esc(a.company)}" />
              </div>
              <div>
                <label>Отправитель</label>
                <input type="text" data-field="sender" value="${esc(a.sender)}" />
              </div>
              <div>
                <label>Орган пломбирования</label>
                <input type="text" data-field="gti" value="${esc(a.gti)}" />
              </div>
            </div>
          </div>
        `;
      }

      function renderAll(acts) {
        actsContainer.innerHTML = acts.map((a, i) => actCardHtml(i, a)).join("");
      }

      function persist() {
        const acts = readActsFromDom();
        writeState({ acts });
      }

      // Init
      (function init() {
        const saved = readState();
        renderAll(saved.acts);
        persist();
      })();

      // Fields that must NOT be carried over when duplicating —
      // vehicle plates and invoice details are always unique per act.
      const UNIQUE_FIELDS = ["iden21", "iden18", "invoice_no", "invoice_date"];

      // Add: duplicate the last act, except unique fields.
      // iden21 is filled from the pool with a value not already in use.
      addBtn.addEventListener("click", () => {
        const acts = readActsFromDom();
        const last = acts[acts.length - 1] || freshAct();
        const next = { ...last };
        for (const f of UNIQUE_FIELDS) next[f] = "";
        next.iden21 = pickRandomIden21();
        acts.push(next);
        renderAll(acts);
        persist();
        const cards = actsContainer.querySelectorAll(".act-card");
        cards[cards.length - 1].scrollIntoView({ behavior: "smooth", block: "start" });
      });

      // Remove (event delegation)
      actsContainer.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-action='remove']");
        if (!btn) return;
        const acts = readActsFromDom();
        if (acts.length <= 1) {
          alert("Нельзя удалить единственный акт.");
          return;
        }
        const card = btn.closest(".act-card");
        const idx = +card.dataset.i;
        acts.splice(idx, 1);
        renderAll(acts);
        persist();
      });

      // Live persist on any input
      form.addEventListener("input", persist);
      form.addEventListener("change", persist);

      function showToast(text) {
        toast.textContent = text;
        toast.classList.add("shown");
        setTimeout(() => toast.classList.remove("shown"), 1800);
      }

      const CHUNK_SIZE = 5;

      // Split all acts into URLs of up to CHUNK_SIZE acts each.
      function buildUrls() {
        const acts = readActsFromDom();
        const base = window.location.href.replace(/\/akt-form\.html.*$/, "/akt.html");
        const urls = [];
        for (let i = 0; i < acts.length; i += CHUNK_SIZE) {
          const chunk = acts.slice(i, i + CHUNK_SIZE);
          const params = new URLSearchParams();
          params.set("n", String(chunk.length));
          for (const a of chunk) {
            for (const f of FIELDS) params.append(f, a[f] || "");
          }
          urls.push({
            url: base + "?" + params.toString(),
            from: i + 1,
            to: i + chunk.length,
          });
        }
        return urls;
      }

      async function copyText(text) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch {
          const ta = document.createElement("textarea");
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          let ok = false;
          try { ok = document.execCommand("copy"); } catch {}
          document.body.removeChild(ta);
          return ok;
        }
      }

      function renderLinkList(items) {
        linkBox.innerHTML = items
          .map(
            (it, i) => `
              <div class="link-item">
                <span class="num">${i + 1}</span>
                <span class="range">акты ${it.from}–${it.to}</span>
                <a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.url)}</a>
                <button type="button" class="copy-one" data-url="${esc(it.url)}">Копировать</button>
              </div>
            `
          )
          .join("");
      }

      // Delegate single-link copy
      linkBox.addEventListener("click", async (e) => {
        const btn = e.target.closest(".copy-one");
        if (!btn) return;
        const ok = await copyText(btn.dataset.url);
        showToast(ok ? "Ссылка скопирована" : "Не удалось скопировать");
      });

      function plural(n) {
        const mod10 = n % 10, mod100 = n % 100;
        if (mod10 === 1 && mod100 !== 11) return "акт";
        if ([2, 3, 4].includes(mod10) && ![12, 13, 14].includes(mod100)) return "акта";
        return "актов";
      }

      function pluralLink(n) {
        const mod10 = n % 10, mod100 = n % 100;
        if (mod10 === 1 && mod100 !== 11) return "ссылка";
        if ([2, 3, 4].includes(mod10) && ![12, 13, 14].includes(mod100)) return "ссылки";
        return "ссылок";
      }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        const items = buildUrls();
        renderLinkList(items);
        linkBox.classList.add("shown");

        if (items.length === 1) {
          openLink.href = items[0].url;
          openLink.style.display = "inline-block";
        } else {
          openLink.style.display = "none";
        }

        const n = readActsFromDom().length;
        const joined = items.map((it) => it.url).join("\n\n");
        const ok = await copyText(joined);
        if (ok) {
          showToast(
            `Скопировано ${items.length} ${pluralLink(items.length)} (${n} ${plural(n)})`
          );
        } else {
          showToast("Не удалось скопировать — выделите вручную");
        }
      });

      document.getElementById("reset").addEventListener("click", function () {
        if (!confirm("Очистить все акты?")) return;
        localStorage.removeItem(LS_KEY);
        location.reload();
      });
    </script>
  </body>
</html>

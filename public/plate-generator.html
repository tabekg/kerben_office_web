<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор номеров — голова / прицеп</title>
<style>
  :root{
    --bg:#0b1120; --panel:#111c33; --panel-2:#0e1830; --line:#1e2d4d;
    --ink:#e8eefc; --muted:#8499c4; --accent:#facc15; --accent-2:#22c55e;
    --copied:#0f2a1c; --copied-line:#1d5b3a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    background:radial-gradient(1200px 600px at 50% -200px,#16264a,var(--bg));
    color:var(--ink);min-height:100vh;padding:28px 16px 60px}
  .wrap{max-width:560px;margin:0 auto}
  h1{font-size:22px;font-weight:700;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:22px}
  .controls{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;
    display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .field{flex:1;min-width:90px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  input{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:11px 12px;font-size:16px;outline:none}
  input:focus{border-color:var(--accent)}
  .btns{display:flex;gap:10px;margin-top:12px;width:100%}
  button{cursor:pointer;border:none;border-radius:10px;font-size:14px;font-weight:600;
    padding:11px 16px;transition:.15s}
  .gen{background:var(--accent);color:#1a1505;flex:1}
  .gen:hover{filter:brightness(1.05)}
  .copyall{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .copyall:hover{border-color:var(--accent-2)}
  .hint{font-size:11px;color:var(--muted);margin-top:6px}
  .bar{display:flex;justify-content:space-between;align-items:center;margin:24px 0 12px}
  .count{font-size:13px;color:var(--muted)}
  .list{display:flex;flex-direction:column;gap:8px}
  .row{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;cursor:pointer;transition:.12s}
  .row:hover{border-color:var(--accent)}
  .row.copied{background:var(--copied);border-color:var(--copied-line)}
  .idx{width:26px;height:26px;flex:none;display:grid;place-items:center;font-size:12px;
    color:var(--muted);background:var(--panel-2);border-radius:8px}
  .plate{flex:1;font-size:18px;font-weight:600;letter-spacing:1px;font-family:"Consolas",monospace}
  .check{flex:none;font-size:12px;color:var(--accent-2);font-weight:600;opacity:0;transition:.12s}
  .row.copied .check{opacity:1}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:30px 0}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--accent-2);color:#04210f;font-weight:600;font-size:13px;padding:10px 18px;
    border-radius:10px;opacity:0;pointer-events:none;transition:.2s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Генератор номеров</h1>
  <div class="sub">Формат: P+5 цифр (голова) / P+4 цифры (прицеп) — случайно но уникально</div>

  <div class="controls">
    <div class="field">
      <label for="qty">Количество</label>
      <input type="number" id="qty" min="1" max="100000" value="10">
    </div>
    <div class="field">
      <label for="pHead">Префикс головы</label>
      <input type="text" id="pHead" placeholder="напр. 21">
    </div>
    <div class="field">
      <label for="pTrail">Префикс прицепа</label>
      <input type="text" id="pTrail" placeholder="напр. 9">
    </div>
    <div class="btns">
      <button class="gen" id="genBtn">Сгенерировать</button>
      <button class="copyall" id="copyAllBtn">Копировать всё</button>
    </div>
  </div>
  <div class="hint" id="hint"></div>

  <div class="bar"><div class="count" id="count">Пусто</div></div>
  <div class="list" id="list">
    <div class="empty">Укажите количество и нажмите «Сгенерировать»</div>
  </div>
</div>

<div class="toast" id="toast">Скопировано</div>

<script>
const HEAD_LEN = 5;   // цифр после P у головы
const TRAIL_LEN = 4;  // цифр после P у прицепа

function digits(n){let s="";for(let i=0;i<n;i++)s+=Math.floor(Math.random()*10);return s;}

// генерирует число-часть с префиксом, добивая случайными цифрами до нужной длины
function part(prefix, len){
  const rest = len - prefix.length;
  if(rest < 0) return null; // префикс длиннее формата
  return "P" + prefix + digits(rest);
}

let items=[];
const listEl=document.getElementById("list");
const countEl=document.getElementById("count");
const toastEl=document.getElementById("toast");
const hintEl=document.getElementById("hint");

function generate(){
  const n=Math.max(1,Math.min(100000,parseInt(document.getElementById("qty").value)||1));
  const pHead=(document.getElementById("pHead").value||"").replace(/\D/g,"");
  const pTrail=(document.getElementById("pTrail").value||"").replace(/\D/g,"");

  if(pHead.length>HEAD_LEN){hintEl.textContent="Префикс головы слишком длинный (макс "+HEAD_LEN+" цифр)";return;}
  if(pTrail.length>TRAIL_LEN){hintEl.textContent="Префикс прицепа слишком длинный (макс "+TRAIL_LEN+" цифр)";return;}

  const maxHead=Math.pow(10,HEAD_LEN-pHead.length);
  const maxTrail=Math.pow(10,TRAIL_LEN-pTrail.length);
  const maxPairs=maxHead*maxTrail;
  if(n>maxPairs){
    hintEl.textContent="Слишком много для этих префиксов. Максимум уникальных пар: "+maxPairs;
    return;
  }
  hintEl.textContent="";

  const usedHead=new Set(), usedTrail=new Set(), usedPair=new Set();
  items=[];
  let guard=0;
  while(items.length<n && guard<n*200){
    guard++;
    const head=part(pHead,HEAD_LEN);
    const trail=part(pTrail,TRAIL_LEN);
    const key=head+"/"+trail;
    if(usedPair.has(key)) continue;
    usedPair.add(key);
    items.push({head,trail,copied:false});
  }
  render();
}

function render(){
  if(!items.length){listEl.innerHTML='<div class="empty">Пусто</div>';countEl.textContent="Пусто";return;}
  countEl.textContent=items.length+" шт. — нажмите на строку чтобы скопировать";
  listEl.innerHTML=items.map((it,i)=>`
    <div class="row ${it.copied?'copied':''}" data-i="${i}">
      <div class="idx">${i+1}</div>
      <div class="plate">${it.head}/${it.trail}</div>
      <div class="check">✓ скопировано</div>
    </div>`).join("");
}

function copyText(text,cb){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(cb).catch(()=>fb(text,cb));
  }else fb(text,cb);
}
function fb(text,cb){
  const t=document.createElement("textarea");t.value=text;t.style.position="fixed";t.style.opacity="0";
  document.body.appendChild(t);t.select();try{document.execCommand("copy")}catch(e){}
  document.body.removeChild(t);cb&&cb();
}
function toast(m){toastEl.textContent=m;toastEl.classList.add("show");
  clearTimeout(toastEl._t);toastEl._t=setTimeout(()=>toastEl.classList.remove("show"),1400);}

listEl.addEventListener("click",e=>{
  const row=e.target.closest(".row");if(!row)return;
  const i=+row.dataset.i;const it=items[i];
  copyText(it.head+"/"+it.trail,()=>{
    it.copied=true;row.classList.add("copied");
    toast("Скопировано: "+it.head+"/"+it.trail);
  });
});

document.getElementById("genBtn").addEventListener("click",generate);
document.getElementById("copyAllBtn").addEventListener("click",()=>{
  if(!items.length)return;
  const all=items.map(it=>it.head+"/"+it.trail).join("\n");
  copyText(all,()=>{items.forEach(it=>it.copied=true);render();toast("Скопировано всё ("+items.length+" шт.)");});
});
["qty","pHead","pTrail"].forEach(id=>document.getElementById(id)
  .addEventListener("keydown",e=>{if(e.key==="Enter")generate();}));

generate();
</script>
</body>
</html>

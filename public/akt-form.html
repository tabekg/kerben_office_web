<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Генератор ссылки на АКТ</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f6f8;
        color: #1f2329;
      }
      .wrap { max-width: 760px; margin: 32px auto; padding: 0 20px 60px; }
      h1 { margin: 0 0 4px; font-size: 22px; }
      .sub { color: #6b7280; margin-bottom: 24px; font-size: 14px; }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 22px 24px;
        margin-bottom: 18px;
        box-shadow: 0 1px 2px rgba(0,0,0,.03);
      }
      .card h2 {
        margin: 0 0 16px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: .05em;
        color: #6b7280;
        font-weight: 600;
      }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .row.one { grid-template-columns: 1fr; }
      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
        color: #374151;
      }
      label .hint { color: #9ca3af; font-weight: 400; margin-left: 6px; font-size: 12px; }
      input, textarea {
        width: 100%;
        font: inherit;
        font-size: 14px;
        padding: 9px 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #fff;
      }
      input:focus, textarea:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37,99,235,.15);
      }
      textarea { min-height: 60px; resize: vertical; font-family: inherit; }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      button, .btn {
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 18px;
        border-radius: 8px;
        border: 1px solid transparent;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
      .btn.primary { background: #2563eb; color: #fff; }
      .btn.primary:hover { background: #1d4ed8; }
      .btn.secondary { background: #fff; color: #374151; border-color: #d1d5db; }
      .btn.secondary:hover { background: #f3f4f6; }
      .btn.ghost { background: transparent; color: #4b5563; }
      .btn.ghost:hover { background: #e5e7eb; }
      .link-box {
        margin-top: 16px;
        padding: 14px;
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        word-break: break-all;
        color: #374151;
        display: none;
      }
      .link-box.shown { display: block; }
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #111827;
        color: #fff;
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 14px;
        opacity: 0;
        transition: all .2s;
        pointer-events: none;
        z-index: 100;
      }
      .toast.shown { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Генератор ссылки на АКТ</h1>
      <p class="sub">Заполните поля и скопируйте ссылку. Она откроет готовый акт.</p>

      <form id="form">
        <div class="card">
          <h2>Данные из декларации</h2>
          <div class="row one">
            <div>
              <label>Дата акта <span class="hint">ДД.ММ.ГГГГ</span></label>
              <input type="text" name="date" id="date" placeholder="27.03.2025" />
            </div>
          </div>
          <div class="row">
            <div>
              <label>Авто отправления (iden21)</label>
              <input type="text" name="iden21" placeholder="06KG245AС/06KG242PA" required />
            </div>
            <div>
              <label>Авто прибытия (iden18)</label>
              <input type="text" name="iden18" placeholder="01M005432/3724AA" required />
            </div>
          </div>
          <div class="row one">
            <div>
              <label>Получатель (get8)</label>
              <textarea name="get8" placeholder='ИП ООО "БАРАКА ХОЛДИНГ", УЗБЕКИСТАН, …' required></textarea>
            </div>
          </div>
          <div class="row">
            <div>
              <label>Инвойс №</label>
              <input type="text" name="invoice_no" placeholder="9980" required />
            </div>
            <div>
              <label>Инвойс от</label>
              <input type="text" name="invoice_date" placeholder="19.03.2025" required />
            </div>
          </div>
          <div class="row one">
            <div>
              <label>Номера пломб <span class="hint">через запятую</span></label>
              <input type="text" name="plomb" placeholder="412,412,412" required />
            </div>
          </div>
        </div>

        <div class="card">
          <h2>Подписанты и реквизиты</h2>
          <div class="row">
            <div>
              <label>Инспектор</label>
              <input type="text" name="inspector" value="АКБАРОВ А." />
            </div>
            <div>
              <label>Представитель</label>
              <input type="text" name="rep" value="СУЛАЙМАНОВ К." />
            </div>
            <div>
              <label>Пункт</label>
              <input type="text" name="point" value="ЦТП «ОШ» ЮЗТ" />
            </div>
            <div>
              <label>Транспортная компания</label>
              <input type="text" name="company" value="ПТЗК «АВТОЭКСПРЕСС ИНВЕСТ»" />
            </div>
            <div>
              <label>Отправитель</label>
              <input type="text" name="sender" value="КНР" />
            </div>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn primary">Скопировать ссылку</button>
          <a id="openLink" class="btn secondary" href="#" target="_blank" rel="noopener" style="display:none">Открыть акт ↗</a>
          <button type="button" class="btn ghost" id="reset">Сбросить</button>
        </div>

        <div class="link-box" id="linkBox"></div>
      </form>
    </div>

    <div class="toast" id="toast">Ссылка скопирована</div>

    <script>
      (function () {
        const d = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        document.getElementById("date").value =
          pad(d.getDate()) + "." + pad(d.getMonth() + 1) + "." + d.getFullYear();
      })();

      const form = document.getElementById("form");
      const linkBox = document.getElementById("linkBox");
      const openLink = document.getElementById("openLink");
      const toast = document.getElementById("toast");

      function showToast(text) {
        toast.textContent = text;
        toast.classList.add("shown");
        setTimeout(() => toast.classList.remove("shown"), 1800);
      }

      function buildUrl() {
        const fd = new FormData(form);
        const params = new URLSearchParams();
        for (const [k, v] of fd.entries()) {
          if (v) params.set(k, v);
        }
        const base = window.location.href.replace(/\/akt-form\.html.*$/, "/akt.html");
        return base + "?" + params.toString();
      }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        const url = buildUrl();
        linkBox.textContent = url;
        linkBox.classList.add("shown");
        openLink.href = url;
        openLink.style.display = "inline-block";

        try {
          await navigator.clipboard.writeText(url);
          showToast("Ссылка скопирована");
        } catch {
          // Fallback for non-secure contexts
          const ta = document.createElement("textarea");
          ta.value = url;
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand("copy");
            showToast("Ссылка скопирована");
          } catch {
            showToast("Не удалось скопировать — выделите ссылку вручную");
          }
          document.body.removeChild(ta);
        }
      });

      document.getElementById("reset").addEventListener("click", function () {
        if (confirm("Очистить все поля?")) {
          form.reset();
          linkBox.classList.remove("shown");
          openLink.style.display = "none";
        }
      });
    </script>
  </body>
</html>

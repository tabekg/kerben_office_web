<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>АКТ перегрузки товара</title>
    <style>
      :root {
        --page-w: 210mm;
        --page-h: 297mm;
        --pad-x: 25mm;
        --pad-y: 20mm;
      }

      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: #e9ebee;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      .page {
        width: var(--page-w);
        min-height: var(--page-h);
        margin: 24px auto;
        padding: var(--pad-y) var(--pad-x);
        background: #fff;
        font-family: "Times New Roman", Times, serif;
        font-size: 14pt;
        color: #000;
        line-height: 1.6;
        box-shadow: 0 4px 14px rgba(0,0,0,.10);
        position: relative;
      }

      .page-num {
        position: absolute;
        top: 6mm;
        right: 8mm;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 10pt;
        color: #9ca3af;
      }

      .title {
        text-align: center;
        font-weight: bold;
        font-size: 18pt;
        line-height: 1.15;
        letter-spacing: .03em;
        margin-bottom: 2mm;
      }
      .title small {
        display: block;
        font-size: 13pt;
        font-weight: bold;
        letter-spacing: 0;
        margin-top: 1mm;
      }

      .meta-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin: 10mm 0 8mm;
        font-size: 13pt;
      }
      .meta-row .company { font-weight: 700; white-space: nowrap; }

      .body {
        text-align: justify;
        text-justify: inter-word;
        text-indent: 12mm;
      }
      .body .v {
        display: inline-block;
        border-bottom: 1px solid #000;
        padding: 0 .25em 1pt;
        line-height: 1.2;
        white-space: nowrap;
        max-width: 100%;
      }
      .body .v.wrap { white-space: normal; }

      .signatures { margin-top: 18mm; }
      .sig {
        display: grid;
        grid-template-columns: 40mm 1fr 8mm 60mm;
        gap: 6mm;
        align-items: end;
        margin-bottom: 12mm;
      }
      .sig .role { line-height: 1; }
      .sig .sign-line { border-bottom: 1px solid #000; height: 0; }
      .sig .name {
        text-align: center;
        border-bottom: 1px solid #000;
        padding: 0 .3em 1pt;
        line-height: 1.25;
      }
      .sig .caption {
        grid-column: 4 / 5;
        text-align: center;
        font-size: 9.5pt;
        margin-top: 1mm;
      }

      .print-btn {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 100;
        background: #2563eb;
        color: #fff;
        border: none;
        padding: 12px 22px;
        border-radius: 999px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(37,99,235,.35);
      }
      .print-btn:hover { background: #1d4ed8; }

      @media print {
        body { background: #fff; }
        .page {
          margin: 0;
          box-shadow: none;
          min-height: auto;
          page-break-after: always;
        }
        .page:last-child { page-break-after: auto; }
        .page-num { display: none; }
        .print-btn { display: none; }
        @page { size: A4; margin: 0; }
      }
    </style>
  </head>
  <body>
    <div id="pages"></div>
    <button class="print-btn" onclick="window.print()" id="printBtn">Печать</button>

    <script>
      function pad(n) { return String(n).padStart(2, "0"); }

      function formatActDate(dateStr) {
        if (!dateStr) return "";
        const m = dateStr.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
        if (!m) return dateStr;
        return "от «__" + pad(m[1]) + "__»___" + pad(m[2]) + "______ " + m[3] + "г.";
      }

      function renderGet8(get8) {
        if (!get8) return "";
        return get8.startsWith('ИП ООО "БАРАКА ХОЛДИНГ", УЗБЕКИСТАН')
          ? 'ИП ООО "БАРАКА ХОЛДИНГ", УЗБЕКИСТАН'
          : get8;
      }

      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderPage(idx, total, act, common) {
        const dateText = formatActDate(act.date);
        const get8 = renderGet8(act.get8 || "");
        const pageNum = total > 1 ? `<div class="page-num">${idx + 1} / ${total}</div>` : "";
        return `
          <div class="page">
            ${pageNum}
            <div class="title">АКТ<small>перегрузки товара</small></div>
            <div class="meta-row">
              <div>${esc(dateText)}</div>
              <div class="company">${esc(common.company)}</div>
            </div>
            <p class="body">
              Мы, нижеподписавшиеся, инспектор <span class="v">${esc(common.point)}</span>
              <span class="v">${esc(common.inspector)}</span>, представитель фирмы
              <span class="v">${esc(common.rep)}</span>, составили настоящий акт о производстве
              перегруза с авто машин <span class="v">${esc(act.iden21 || "")}</span> на автомашины
              <span class="v">${esc(act.iden18 || "")}</span>. Отправитель —
              <span class="v">${esc(common.sender)}</span>; получатель —
              <span class="v wrap">${esc(get8)}</span>. Количество перегруженного груза составило:
              <span class="v">согласно инвойсу №&nbsp;${esc(act.invoice_no || "")} от&nbsp;${esc(act.invoice_date || "")}</span>.
              Груз опломбирован <span class="v">${esc(common.gti)}&nbsp;${esc(act.plomb || "")}</span>.
            </p>
            <div class="signatures">
              <div class="sig">
                <div class="role">Инспектор</div>
                <div class="sign-line"></div>
                <div></div>
                <div class="name">${esc(common.inspector)}</div>
                <div class="caption">(подпись и Ф.И.О.)</div>
              </div>
              <div class="sig">
                <div class="role">Представитель</div>
                <div class="sign-line"></div>
                <div></div>
                <div class="name">${esc(common.rep)}</div>
                <div class="caption">(подпись и Ф.И.О.)</div>
              </div>
            </div>
          </div>
        `;
      }

      const q = new URLSearchParams(window.location.search);
      if (![...q.keys()].length) {
        window.location.replace("akt-form.html");
      }

      const common = {
        inspector: q.get("inspector") || "АКБАРОВ А.",
        rep: q.get("rep") || "СУЛАЙМАНОВ К.",
        point: q.get("point") || "ЦТП «ОШ» ЮЗТ",
        company: q.get("company") || "ПТЗК «АВТОЭКСПРЕСС ИНВЕСТ»",
        sender: q.get("sender") || "КНР",
        gti: q.get("gti") || "ГТИ КР",
      };

      const ACT_FIELDS = ["date", "iden21", "iden18", "get8", "invoice_no", "invoice_date", "plomb"];
      const arrays = {};
      for (const f of ACT_FIELDS) arrays[f] = q.getAll(f);

      // Determine count: max of array lengths or explicit n param.
      const declared = parseInt(q.get("n") || "0", 10) || 0;
      const maxLen = Math.max(declared, ...ACT_FIELDS.map((f) => arrays[f].length));
      const count = Math.max(1, maxLen);

      const acts = [];
      for (let i = 0; i < count; i++) {
        const a = {};
        for (const f of ACT_FIELDS) a[f] = arrays[f][i] || "";
        acts.push(a);
      }

      document.title = count > 1 ? `АКТЫ перегрузки товара (${count})` : "АКТ перегрузки товара";

      const html = acts.map((a, i) => renderPage(i, count, a, common)).join("");
      document.getElementById("pages").innerHTML = html;
    </script>
  </body>
</html>
